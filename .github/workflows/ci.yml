name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  mod:
    name: NeoForge Connector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: mod/neoforge-connector

      - name: Build Mod
        run: ./gradlew build
        working-directory: mod/neoforge-connector

      - name: Upload Mod jar
        uses: actions/upload-artifact@v4
        with:
          name: blockforge-connector-jar
          path: mod/neoforge-connector/build/libs/*.jar
          if-no-files-found: error

      # Multi-loader roadmap:
      # Forge CI is planned for v1.1.2 after the Forge connector module exists.

  fabric:
    name: Fabric Connector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Fabric connector presence
        id: fabric
        run: |
          if [ -f mod/fabric-connector/build.gradle ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java 21
        if: steps.fabric.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: steps.fabric.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        if: steps.fabric.outputs.present == 'true'
        run: chmod +x ./gradlew
        working-directory: mod/fabric-connector

      - name: Build Fabric Mod
        if: steps.fabric.outputs.present == 'true'
        run: ./gradlew build
        working-directory: mod/fabric-connector

      - name: Upload Fabric jar
        if: steps.fabric.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: blockforge-fabric-connector-jar
          path: mod/fabric-connector/build/libs/*.jar
          if-no-files-found: error
