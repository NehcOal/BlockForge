name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  neoforge:
    name: NeoForge Connector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: mod/neoforge-connector

      - name: Build Mod
        run: ./gradlew build
        working-directory: mod/neoforge-connector

      - name: Upload NeoForge jar
        uses: actions/upload-artifact@v4
        with:
          name: blockforge-neoforge-jar
          path: mod/neoforge-connector/build/libs/*.jar
          if-no-files-found: error

  fabric:
    name: Fabric Connector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: mod/fabric-connector

      - name: Build Fabric Mod
        run: ./gradlew build
        working-directory: mod/fabric-connector

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: blockforge-fabric-jar
          path: mod/fabric-connector/build/libs/*.jar
          if-no-files-found: error

  forge:
    name: Forge Connector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: mod/forge-connector

      - name: Build Forge Mod
        run: ./gradlew build
        working-directory: mod/forge-connector

      - name: Upload Forge jar
        uses: actions/upload-artifact@v4
        with:
          name: blockforge-forge-jar
          path: mod/forge-connector/build/libs/*.jar
          if-no-files-found: error
