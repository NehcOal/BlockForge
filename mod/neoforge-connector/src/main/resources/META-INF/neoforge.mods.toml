modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/NehcOal/BlockForge/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/NehcOal/BlockForge"
authors="NehcOal and contributors"
description='''
BlockForge Connector NeoForge loads BlockForge Blueprint JSON v1/v2 files exported by the BlockForge web app.
It provides /blockforge commands, a Builder Wand, Ghost Preview, GUI selection, material checks, and undo support for Minecraft Java 1.21.1 with NeoForge 21.1.227.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},21.2)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
